<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<form method="post">
		<label for="Name">Name</label>
		<input placeholder="Name"type="text"id="name"required>
		<label for="email">E-Mail</label>
		<input placeholder="E-Mail"type="EMail"id="email"required>
		<label for="gender_m">Male</label>
		<input type="radio" id="gender_m" name="Gender" required>
		<label for="gender_f">Female</label>
		<input type="radio" id="gender_f" name="Gender" required>
		<label for="cars">Select a car </label>
		<select placeholder="--Please choose an option--"id="cars"required>
			<option>BMW</option>
			<option>Audi</option>
			<option>Tata</option>
		</select>
	<label for="Age">Age</label>
		<input placeholder="Age"type="number"id="Age"required>
	<label for="DOB">DOB</label>
		<input type="Date"id="dob"required><br>
	<label for="Tel">Phone Number</label>
		<input placeholder="****-****-****"type="tel"id="tel">
		<label for= "Password">Password</label>	
			<input placeholder="Password"type="Password"id="Password"required>
			<label for="tos">I agree to the TOS </label>
			<input type="checkbox"required id="tos"><br>
	<label for= "button">Submit</label>
		<input type="submit"id="submit"value="submit">
	
	</form>
	<!-- the entire body must be written by student -->

</script>

</body>

</html>
